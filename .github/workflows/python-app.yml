name: Python application

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

jobs:
  tag_gate:
    name: Gate release tags to master only
    runs-on: ubuntu-latest
    outputs:
      allow: ${{ steps.gate.outputs.allow }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          fetch-depth: 0

      - id: gate
        shell: bash
        run: |
          set -euo pipefail

          # PR/workflow_dispatch always run. For tag pushes, only allow tags on origin/master.
          if [[ "${GITHUB_EVENT_NAME}" != "push" || "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "allow=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin master --depth=1
          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
            echo "allow=true" >> "$GITHUB_OUTPUT"
          else
            echo "allow=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping workflow: ${GITHUB_REF} is not on origin/master."
          fi

  classify_changes:
    name: Classify changed files
    needs: [tag_gate]
    if: needs.tag_gate.outputs.allow == 'true'
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.classify.outputs.code_changed }}
      docs_changed: ${{ steps.classify.outputs.docs_changed }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          # Non-PR events keep previous behavior.
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          code_changed=false
          docs_changed=false

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            if [[ "$file" == docs/* || "$file" == README.md || "$file" == .readthedocs.yaml ]]; then
              docs_changed=true
            else
              code_changed=true
            fi
          done <<< "$CHANGED_FILES"

          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          echo "docs_changed=$docs_changed" >> "$GITHUB_OUTPUT"

  test_pytest:
    name: Pytest on Linux (Python ${{ matrix.python-version }})
    needs: [tag_gate, classify_changes]
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name != 'push' && needs.classify_changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest

  test_pytest_macos:
    name: Pytest on macOS (Python ${{ matrix.python-version }})
    needs: [tag_gate, classify_changes]
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name != 'push' && needs.classify_changes.outputs.code_changed == 'true'
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          brew install gcc

      - name: Select GNU compilers (macOS)
        run: |
          set -euo pipefail
          BREW_PREFIX="$(brew --prefix)"
          FVER="$(
            { ls "$BREW_PREFIX"/bin/gfortran-* 2>/dev/null \
                | sed -E 's#.*gfortran-##' \
                | sort -V \
                | tail -n1; } || true
          )"
          if [ -z "${FVER}" ] && [ -x "$BREW_PREFIX/bin/gfortran" ]; then
            FVER="$("$BREW_PREFIX/bin/gfortran" -dumpversion | cut -d. -f1 || true)"
          fi
          [ -n "${FVER}" ] || { echo "No gfortran found"; exit 1; }
          [ -x "$BREW_PREFIX/bin/gcc-$FVER" ] || { echo "missing gcc-$FVER"; exit 1; }
          [ -x "$BREW_PREFIX/bin/g++-$FVER" ] || { echo "missing g++-$FVER"; exit 1; }
          if [ -x "$BREW_PREFIX/bin/gfortran-$FVER" ]; then
            echo "FC=$BREW_PREFIX/bin/gfortran-$FVER" >> $GITHUB_ENV
          else
            echo "FC=$BREW_PREFIX/bin/gfortran" >> $GITHUB_ENV
          fi
          echo "CC=$BREW_PREFIX/bin/gcc-$FVER" >> $GITHUB_ENV
          echo "CXX=$BREW_PREFIX/bin/g++-$FVER" >> $GITHUB_ENV

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest

  build_docs:
    name: Build docs
    needs: [tag_gate, classify_changes]
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name != 'push' && needs.classify_changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build Sphinx docs
        run: |
          sphinx-build -W --keep-going -b html docs docs/_build/html

  build_sdist:
    name: Build source distribution
    needs: [tag_gate]
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [tag_gate]
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cibuildwheel downloads (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/cibuildwheel
          key: cibw-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-

      - name: Seed cibuildwheel virtualenv (macOS)
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          mkdir -p ~/Library/Caches/cibuildwheel
          cp .github/vendor/virtualenv-20.27.1.pyz \
             ~/Library/Caches/cibuildwheel/virtualenv-20.27.1.pyz

      - name: Build wheels (Linux)
        if: matrix.os != 'macos-14'
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels (macOS, first attempt)
        if: matrix.os == 'macos-14'
        id: cibw_macos_first
        continue-on-error: true
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels (macOS, retry once)
        if: matrix.os == 'macos-14' && steps.cibw_macos_first.outcome == 'failure'
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [tag_gate, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [tag_gate, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: needs.tag_gate.outputs.allow == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* --repo "$REPO" --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
