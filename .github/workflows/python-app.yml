name: Python application

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

jobs:
  test_pytest:
    name: Pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest

  test_pytest_macos:
    name: Pytest on macOS (Python ${{ matrix.python-version }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          brew install gcc

      - name: Select GNU compilers (macOS)
        run: |
          set -euo pipefail
          BREW_PREFIX="$(brew --prefix)"
          FVER="$(
            { ls "$BREW_PREFIX"/bin/gfortran-* 2>/dev/null \
                | sed -E 's#.*gfortran-##' \
                | sort -V \
                | tail -n1; } || true
          )"
          if [ -z "${FVER}" ] && [ -x "$BREW_PREFIX/bin/gfortran" ]; then
            FVER="$("$BREW_PREFIX/bin/gfortran" -dumpversion | cut -d. -f1 || true)"
          fi
          [ -n "${FVER}" ] || { echo "No gfortran found"; exit 1; }
          [ -x "$BREW_PREFIX/bin/gcc-$FVER" ] || { echo "missing gcc-$FVER"; exit 1; }
          [ -x "$BREW_PREFIX/bin/g++-$FVER" ] || { echo "missing g++-$FVER"; exit 1; }
          if [ -x "$BREW_PREFIX/bin/gfortran-$FVER" ]; then
            echo "FC=$BREW_PREFIX/bin/gfortran-$FVER" >> $GITHUB_ENV
          else
            echo "FC=$BREW_PREFIX/bin/gfortran" >> $GITHUB_ENV
          fi
          echo "CC=$BREW_PREFIX/bin/gcc-$FVER" >> $GITHUB_ENV
          echo "CXX=$BREW_PREFIX/bin/g++-$FVER" >> $GITHUB_ENV

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cibuildwheel downloads (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/cibuildwheel
          key: cibw-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-

      - name: Seed cibuildwheel virtualenv (macOS)
        if: matrix.os == 'macos-14'
        run: |
          set -euo pipefail
          mkdir -p ~/Library/Caches/cibuildwheel
          cp .github/vendor/virtualenv-20.27.1.pyz \
             ~/Library/Caches/cibuildwheel/virtualenv-20.27.1.pyz

      - name: Build wheels (Linux)
        if: matrix.os != 'macos-14'
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels (macOS, first attempt)
        if: matrix.os == 'macos-14'
        id: cibw_macos_first
        continue-on-error: true
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - name: Build wheels (macOS, retry once)
        if: matrix.os == 'macos-14' && steps.cibw_macos_first.outcome == 'failure'
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [test_pytest, test_pytest_macos, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [test_pytest, test_pytest_macos, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* --repo "$REPO" --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
